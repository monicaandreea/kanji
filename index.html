<script type="text/babel">
const { useState, useEffect, useRef } = React;

const LIGHT = {
  ink: "#2e1a3e", paper: "#f7f4ee", paperDark: "#ede9e0",
  muted: "#8a8478", line: "#d4cfc4", correct: "#d6699a",
  wrong: "#7d2348", gold: "#9b7fc4", card: "#ffffff",
  softGreen: "#fdf0f5", softGreenBright: "#fce4ee", softRed: "#f3dae0",
  accent: "#2e1a3e", header: "#2e1a3e",
};
const DARK = {
  ink: "#e8def5", paper: "#1a1320", paperDark: "#241a2e",
  muted: "#9a8fa8", line: "#3a2f47", correct: "#f0a0c0",
  wrong: "#c25575", gold: "#b89ad8", card: "#241a2e",
  softGreen: "#3a2230", softGreenBright: "#4a2838", softRed: "#3a1f28",
  accent: "#6b4a8f", header: "#2a1d38",
};
const THEME_KEY = "kanji-theme";
const MODE_KEY = "kanji-mode";
function loadTheme() {
  const t = localStorage.getItem(THEME_KEY);
  return t === "dark" ? "dark" : "light";
}
// C is a live object; its properties are swapped when the theme changes.
const C = { ...(loadTheme() === "dark" ? DARK : LIGHT) };
function applyTheme(name) {
  const src = name === "dark" ? DARK : LIGHT;
  Object.keys(src).forEach(k => { C[k] = src[k]; });
  localStorage.setItem(THEME_KEY, name);
  document.body.style.background = C.paper;
}

const PROGRESS_KEY = "kanji-progress-v1";
const WORDS_KEY = "kanji-words-v1";

// ── Config — fill these in after Supabase setup ──────────────────────────
const SUPABASE_URL = "https://scicjgxzbiptnjwsbyzv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_xTSFjCF8rMaFSf-Xig_0uQ_6Ku-4NZt";
const SUPABASE_ENABLED = SUPABASE_URL !== "YOUR_SUPABASE_URL";

// ── User ID — shown in settings so user can copy it to other devices ────
function getUserId() {
  let id = localStorage.getItem("kanji-user-id");
  if (!id) { id = crypto.randomUUID(); localStorage.setItem("kanji-user-id", id); }
  return id;
}
function setUserId(id) {
  localStorage.setItem("kanji-user-id", id.trim());
}

// ── Local storage helpers ─────────────────────────────────────────────────
function localGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }

        const meanings = meaningsRaw.split(",").map(m => m.trim()).filter(Boolean);

    tokens.map((t, i) => {

      const tappable = hasJa && t.pos && !['助詞','助動詞','記号'].includes(t.pos);
      if (!tappable) return React.createElement('span', { key: i }, t.surface);

function DrawCanvas({ clearTrigger }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * (canvas.width / rect.width),
      y: (src.clientY - rect.top) * (canvas.height / rect.height),
    };
  };

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = C.line; ctx.lineWidth = 0.5; ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height);
    ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2);
    ctx.stroke(); ctx.setLineDash([]);
  }, [clearTrigger]);

  const startDraw = e => {
    e.preventDefault(); drawing.current = true;
    const canvas = canvasRef.current;
    const pos = getPos(e, canvas); lastPos.current = pos;
    const ctx = canvas.getContext('2d');
    ctx.beginPath(); ctx.arc(pos.x, pos.y, 2, 0, Math.PI*2);
    ctx.fillStyle = C.ink; ctx.fill();
  };
  const draw = e => {
    e.preventDefault(); if (!drawing.current) return;
    const canvas = canvasRef.current; const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y); ctx.strokeStyle = C.ink;
    ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke(); lastPos.current = pos;
  };
  const stopDraw = () => { drawing.current = false; };

  return React.createElement('canvas', {
    ref: canvasRef, width: 280, height: 280,
    style: { border: `2px solid ${C.line}`, borderRadius: 8, background: C.card,
      cursor: 'crosshair', touchAction: 'none', width: '100%', maxWidth: 280 },
    onMouseDown: startDraw, onMouseMove: draw, onMouseUp: stopDraw, onMouseLeave: stopDraw,
    onTouchStart: startDraw, onTouchMove: draw, onTouchEnd: stopDraw,
  });
}

function WriteMode({ items, progress, onAnswer, onCurrentWord, onTapKanji, onTapWord, idx, onAdvance }) {

  // Reset to write phase + hide strokes whenever the card changes
  React.useEffect(() => { setPhase('write'); setShowStrokes(true); }, [item.id]);

  const reveal = () => setPhase('reveal');
  const clear = () => setClearTrigger(t => t + 1);
  const practice = () => { setClearTrigger(t => t + 1); }; // clear canvas, stay on same word & revealed

            <div style={{ fontSize:18, color:C.ink, fontWeight:600, marginBottom:6 }}>

                {showStrokes ? 'Hide stroke order' : 'Show stroke order'}

          </div>

            <div style={{ background:C.paperDark, borderRadius:8, padding:'12px 14px', width:'100%' }}>

            </div>

        <div style={{ display:'flex', gap:10, width:'100%' }}>

          <button onClick={() => grade(false)} style={btn(C.wrong,'white')}>✗ Wrong</button>
          <button onClick={() => grade(true)} style={btn(C.correct,'white')}>✓ Correct</button>
        </div>

  );
}

  // but NOT when a single word is toggled — so toggling doesn't re-sort the list
  // and bounce your scroll position.
  const sortActiveRef = React.useRef(null);
  const sortCtxRef = React.useRef('');
  const sortCtx = `${filter}|${search}|${activeFirst}`;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function App() {
  const [items, setItems] = useState(null);
  const [progress, setProgress] = useState({});
  const [mode, setModeState] = useState(() => {
    const m = localStorage.getItem(MODE_KEY);
    return ['write','quiz','words','read','kanji'].includes(m) ? m : 'write';
  });
  const setMode = (m) => { setModeState(m); try { localStorage.setItem(MODE_KEY, m); } catch {} };
  const [ready, setReady] = useState(false);
  const [showAccount, setShowAccount] = useState(false);
  const [sessionSize, setSessionSizeState] = useState(() => {
    const v = parseInt(localStorage.getItem(SESSION_KEY), 10);
    return Number.isFinite(v) && v > 0 ? v : 10;
  });
  const [masteryTarget, setMasteryTargetState] = useState(() => {
    const v = parseInt(localStorage.getItem(MASTERY_KEY), 10);
    return Number.isFinite(v) && v > 0 ? v : 5;
  });
  const setMasteryTarget = (n) => {
    const v = Math.max(1, Math.min(n, 20));
    setMasteryTargetState(v);
    localStorage.setItem(MASTERY_KEY, String(v));
  };
  // Active deck: ordered list of word IDs for this session (sticky, persisted)
  const [activeIds, setActiveIds] = useState(null);
  const [deckLoaded, setDeckLoaded] = useState(false);
  const currentWordRef = useRef(null);
  const shuffledOrderRef = useRef(null);
  const touchStartRef = useRef(null);
  const [deckIdx, setDeckIdx] = useState(0); // position in the active deck, shared across Write/Quiz and tab switches
  const [kanjiPopup, setKanjiPopup] = useState(null);
  const [wordPopup, setWordPopup] = useState(null);
  const [theme, setTheme] = useState(loadTheme);
  const toggleTheme = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    setTheme(next);
  };
  useEffect(() => { applyTheme(theme); }, []);

  useEffect(() => {
    (async () => {
      const [savedProgress, savedWords, savedDeck] = await Promise.all([
        storageGet(PROGRESS_KEY),
        storageGet(WORDS_KEY),
        storageGet(DECK_KEY),
      ]);
      if (savedProgress) setProgress(savedProgress);
      if (savedWords) setItems(savedWords);
      if (Array.isArray(savedDeck)) setActiveIds(savedDeck);
      setDeckLoaded(true);
      setReady(true);
    })();
  }, []);

  const persistDeck = (deck) => { storageSet(DECK_KEY, deck); };

  // Build/refill the active deck. Sticky: keeps existing active words,
  // drops mastered ones, and tops up to sessionSize from unmastered words.
  useEffect(() => {
    if (!items || !deckLoaded) return;
    const isMastered = id => (progress[id]?.streak || 0) >= masteryTarget;
    const validIds = new Set(items.map(it => it.id));

    setActiveIds(prev => {
      // Start from existing deck (if any), keep only valid + unmastered words
      let deck = (prev || []).filter(id => validIds.has(id) && !isMastered(id));
      // Top up with new unmastered words not already in the deck
      if (deck.length < sessionSize) {
        const inDeck = new Set(deck);
        const candidates = items.filter(it => !inDeck.has(it.id) && !isMastered(it.id));
        const fill = shuffle(candidates).slice(0, sessionSize - deck.length).map(it => it.id);
        deck = [...deck, ...fill];
      }
      // If everything is mastered and deck is empty, fall back to reviewing all
      if (deck.length === 0 && items.length > 0) {
        deck = shuffle(items).slice(0, sessionSize).map(it => it.id);
      }
      persistDeck(deck);
      return deck;
    });
  }, [items, deckLoaded, sessionSize]);

  const setSessionSize = (n) => {
    const v = Math.max(1, Math.min(n, 200));
    setSessionSizeState(v);
    localStorage.setItem(SESSION_KEY, String(v));
    // Rebuild deck fresh at the new size
    if (items) {
      const isMastered = id => (progress[id]?.streak || 0) >= masteryTarget;
      const unmastered = items.filter(it => !isMastered(it.id));
      const pool = unmastered.length > 0 ? unmastered : items;
      const deck = shuffle(pool).slice(0, v).map(it => it.id);
      setActiveIds(deck);
      persistDeck(deck);
    }
  };

  const reshuffle = () => {
    if (!items) return;
    const isMastered = id => (progress[id]?.streak || 0) >= masteryTarget;
    const unmastered = items.filter(it => !isMastered(it.id));
    const pool = unmastered.length > 0 ? unmastered : items;
    const deck = shuffle(pool).slice(0, sessionSize).map(it => it.id);
    setActiveIds(deck);
    persistDeck(deck);
  };

  const handleImport = parsed => { setItems(parsed); storageSet(WORDS_KEY, parsed); setActiveIds(null); storageSet(DECK_KEY, null); };
  const handleMerge = parsed => {
    let added = 0, enriched = 0;
    setItems(prev => {
      const existing = prev || [];
      const next = existing.map(it => ({ ...it })); // shallow copies so we can mutate sentences
      const byWord = new Map(next.map(it => [it.word, it])); // map to the COPIES, not originals
      const existingIds = new Set(next.map(it => it.id));

      parsed.forEach(incoming => {
        const dupById = existingIds.has(incoming.id);
        const match = byWord.get(incoming.word);
        if (match || dupById) {
          // Duplicate word: merge its example sentences into the existing entry
          const target = match || next.find(it => it.id === incoming.id);
          if (!target) return;
          const current = getSentences(target);
          const incomingS = getSentences(incoming);
          const seen = new Set(current.map(s => s.ja));
          let changed = false;
          incomingS.forEach(s => { if (!seen.has(s.ja)) { current.push(s); seen.add(s.ja); changed = true; } });
          if (changed) {
            target.sentences = current;
            // keep legacy fields pointed at the first sentence for any old readers
            target.sentence = current[0] ? current[0].ja : null;
            target.sentenceEn = current[0] ? current[0].en : null;
            enriched++;
          }
        } else {
          // Brand new word — normalize to the sentences[] shape
          const sents = getSentences(incoming);
          const w = { ...incoming, sentences: sents,
            sentence: sents[0] ? sents[0].ja : null,
            sentenceEn: sents[0] ? sents[0].en : null };
          next.push(w);
          byWord.set(w.word, w);
          existingIds.add(w.id);
          added++;
        }
      });

      storageSet(WORDS_KEY, next);
      return next;
    });
    return { added, enriched };
  };
  const handleAnswer = (id, correct) => {
    setProgress(prev => {
      const e = prev[id]||{correct:0,wrong:0,streak:0};
      const newStreak = correct ? (e.streak||0)+1 : 0;
      const next = { ...prev, [id]:{
        correct: e.correct+(correct?1:0),
        wrong: e.wrong+(correct?0:1),
        streak: newStreak,
      } };
      storageSet(PROGRESS_KEY, next);

      // If this word just got mastered, swap in a fresh unmastered word
      if (newStreak >= masteryTarget && items) {
        setActiveIds(prevDeck => {
          if (!prevDeck) return prevDeck;
          const inDeck = new Set(prevDeck);
          const candidate = shuffle(items.filter(it =>
            !inDeck.has(it.id) && (next[it.id]?.streak || 0) < masteryTarget
          ))[0];
          // Drop the mastered word; append the new one if there is one
          const updated = candidate
            ? [...prevDeck.filter(x => x !== id), candidate.id]
            : prevDeck.filter(x => x !== id);
          persistDeck(updated);
          return updated;
        });
      }
      return next;
    });
  };
  const handleRemove = id => {
    setItems(prev => { const next=prev.filter(it=>it.id!==id); storageSet(WORDS_KEY,next); return next; });
    setActiveIds(prev => { if (!prev) return prev; const next = prev.filter(x => x !== id); persistDeck(next); return next; });
  };
  const handleAdd = word => {
    setItems(prev => { const next=[...prev,word]; storageSet(WORDS_KEY,next); return next; });
  };
  const handleEdit = (id, updated) => {
    setItems(prev => {
      const next = prev.map(it => it.id===id ? { ...it, ...updated, id } : it);
      storageSet(WORDS_KEY, next);
      return next;
    });
  };
  const addToActive = id => {
    // Don't allow adding mastered words to the active set (reset them first)
    if ((progress[id]?.streak||0) >= masteryTarget) return;
    setActiveIds(prev => {
      const cur = prev || [];
      if (cur.includes(id)) return cur;
      const next = [...cur, id];
      persistDeck(next);
      return next;
    });
  };
  const removeFromActive = id => {
    setActiveIds(prev => {
      if (!prev) return prev;
      const next = prev.filter(x => x !== id);
      persistDeck(next);
      return next;
    });
  };
  const resetProgress = () => {
    if (!confirm('Reset all your progress?')) return;
    setProgress({}); storageSet(PROGRESS_KEY, {}); setActiveIds(null); storageSet(DECK_KEY, null);
  };
  const resetWord = (id) => {
    setProgress(prev => {
      const next = { ...prev };
      delete next[id];
      storageSet(PROGRESS_KEY, next);
      return next;
    });
    // Keep the word in the active set (re-add if it had dropped out)
    setActiveIds(prev => {
      const cur = prev || [];
      if (cur.includes(id)) return cur;
      const next = [...cur, id];
      persistDeck(next);
      return next;
    });
  };
  const markMastered = (id) => {
    const e = progress[id] || { correct:0, wrong:0, streak:0 };
    const nextProgress = { ...progress, [id]: { ...e, streak: masteryTarget, correct: Math.max(e.correct||0, masteryTarget) } };
    setProgress(nextProgress);
    storageSet(PROGRESS_KEY, nextProgress);
    // drop it from the active deck since it's now mastered
    const nextDeck = (activeIds || []).filter(x => x !== id);
    setActiveIds(nextDeck);
    persistDeck(nextDeck);
  };
  const clearWords = () => {
    if (!confirm('Load a new word list? This won\'t delete your progress.')) return;
    setItems(null); storageSet(WORDS_KEY, null); setActiveIds(null); storageSet(DECK_KEY, null);
  };

  if (!ready) return React.createElement('div', {
    style:{ display:'flex', alignItems:'center', justifyContent:'center',
      height:'100vh', background:C.paper, color:C.muted, fontSize:14 }}, 'Loading…');

  if (showAccount) return React.createElement('div', {
    style:{ minHeight:'100vh', background:C.paper, paddingTop:20 }},
    React.createElement(AccountScreen, { onClose:()=>setShowAccount(false), onReset:resetProgress,
      onClearWords:clearWords, sessionSize, onSessionSize:setSessionSize,
      masteryTarget, onMasteryTarget:setMasteryTarget, theme, onToggleTheme:toggleTheme }));

  if (!items) return React.createElement('div', {
    style:{ minHeight:'100vh', background:C.paper, display:'flex', alignItems:'center' }},
    React.createElement(ImportScreen, { onImport:handleImport, onAccount:()=>setShowAccount(true) }));

  // Active deck: the words for this session, in shuffled display order.
  // The order is shuffled once when the app opens, and stays stable as words
  // get mastered during a session (mastered words just drop out, order kept).
  // New words added to the active set get appended (shuffled in).
  const idToItem = {};
  items.forEach(it => { idToItem[it.id] = it; });
  const curSet = new Set(activeIds || []);
  if (shuffledOrderRef.current === null) {
    // First build this app session: shuffle the whole active set
    shuffledOrderRef.current = shuffle(activeIds || []);
  } else {
    // Keep existing order minus removed ids, then append any newly-added ids
    const kept = shuffledOrderRef.current.filter(id => curSet.has(id));
    const keptSet = new Set(kept);
    const added = (activeIds || []).filter(id => !keptSet.has(id));
    shuffledOrderRef.current = added.length ? [...kept, ...shuffle(added)] : kept;
  }
  const deck = shuffledOrderRef.current.map(id => idToItem[id]).filter(Boolean);
  const deckEmpty = deck.length === 0;
  // Advance to the next card in the active deck, wrapping around. Lives in App
  // so the position survives tab switches and is shared between Write & Quiz.
  const advanceDeck = () => { setDeckIdx(i => deck.length ? (i + 1) % deck.length : 0); };

  // Swipe between main tabs (left/right). Account (⚙) is excluded — it's an overlay.
  const swipeTabs = ['write','quiz','words','read','kanji'];
  const onTouchStart = (e) => {
    // Ignore swipes that begin on the drawing canvas (so writing doesn't switch tabs)
    if (e.target && e.target.tagName === 'CANVAS') { touchStartRef.current = null; return; }
    const t = e.touches && e.touches[0];
    touchStartRef.current = t ? { x: t.clientX, y: t.clientY } : null;
  };
  const onTouchEnd = (e) => {
    const start = touchStartRef.current;
    touchStartRef.current = null;
    if (!start) return;
    const t = e.changedTouches && e.changedTouches[0];
    if (!t) return;
    const dx = t.clientX - start.x, dy = t.clientY - start.y;
    // Require a mostly-horizontal swipe of decent length
    if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const cur = swipeTabs.indexOf(mode);
    if (cur === -1) return;
    const nextIdx = dx < 0 ? cur + 1 : cur - 1; // swipe left → next tab
    if (nextIdx < 0 || nextIdx >= swipeTabs.length) return;
    setMode(swipeTabs[nextIdx]);
  };

  const masteredCount = items.filter(it => (progress[it.id]?.streak||0) >= masteryTarget).length;
  const allMastered = masteredCount === items.length && items.length > 0;

  return React.createElement('div', { style:{ minHeight:'100vh', background:C.paper } },
    React.createElement('div', { style:{ background:C.header, color:'white', padding:'12px 14px',
      display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, flexWrap:'wrap' }},
      React.createElement('div', { style:{ fontSize:18, fontWeight:700, flexShrink:0 } }, '漢字'),
      React.createElement('div', { style:{ display:'flex', gap:1, flexWrap:'wrap', justifyContent:'flex-end' } },
        [['write','Write'],['quiz','Quiz'],['words','Words'],['read','Read'],['kanji','Dict'],['account','⚙']].map(([m,label])=>
          React.createElement('button', { key:m, onClick:()=> m==='account' ? setShowAccount(true) : setMode(m), style:{
            padding:'6px 7px', borderRadius:6, border:'none',
            background:mode===m?'rgba(255,255,255,0.2)':'transparent',
            color:'white', fontSize:12, cursor:'pointer', whiteSpace:'nowrap' }}, label)
        )
      )
    ),
    kanjiPopup && React.createElement(KanjiPopup, { char:kanjiPopup, onClose:()=>setKanjiPopup(null), items }),
    wordPopup && React.createElement(WordPopup, { token:wordPopup, onClose:()=>setWordPopup(null),
      existing:items, onAdd:(w)=>handleAdd(w) }),
    React.createElement('div', { style:{ maxWidth:420, margin:'0 auto', padding:20, minHeight:'calc(100vh - 60px)' },
      onTouchStart, onTouchEnd },
      // Session controls bar (only on practice tabs)
      (mode==='write' || mode==='quiz') && React.createElement('div', {
        style:{ display:'flex', alignItems:'center', justifyContent:'flex-end',
          marginBottom:16, fontSize:12, color:C.muted, gap:6, flexWrap:'wrap' }},
        React.createElement('button', { onClick:()=>{ const id=currentWordRef.current; if(id){ markMastered(id); advanceDeck(); } },
          style:{ background:C.card, border:`1px solid ${C.correct}`, borderRadius:6,
            padding:'5px 10px', fontSize:12, cursor:'pointer', color:C.correct, flexShrink:0 } }, 'Mastered'),
        React.createElement('button', { onClick:()=>{ const id=currentWordRef.current; if(id){ const w=idToItem[id]; if(w && confirm(`Delete "${w.word}"?`)) handleRemove(id); } },
          style:{ background:C.card, border:`1px solid ${C.line}`, borderRadius:6,
            padding:'5px 10px', fontSize:12, cursor:'pointer', color:C.wrong, flexShrink:0 } }, 'Delete'),
        React.createElement('button', { onClick:()=>{ if(confirm('Shuffle in a new set of words? Your current active set will be replaced (progress is kept).')) reshuffle(); },
          style:{ background:C.card, border:`1px solid ${C.line}`, borderRadius:6,
            padding:'5px 10px', fontSize:12, cursor:'pointer', color:C.ink, flexShrink:0 } }, 'New set')
      ),
      mode==='write' && (deckEmpty
        ? React.createElement('div', { style:{ textAlign:'center', color:C.muted, padding:'40px 20px' } }, 'No active words. Add some in the Words tab.')
        : React.createElement(WriteMode, { items:deck, progress, idx:Math.min(deckIdx, deck.length-1), onAdvance:advanceDeck, onAnswer:handleAnswer, onCurrentWord:(id)=>{currentWordRef.current=id;}, onTapKanji:setKanjiPopup, onTapWord:setWordPopup })),
      mode==='quiz' && (deckEmpty
        ? React.createElement('div', { style:{ textAlign:'center', color:C.muted, padding:'40px 20px' } }, 'No active words. Add some in the Words tab.')
        : React.createElement(QuizMode, { items:deck, progress, idx:Math.min(deckIdx, deck.length-1), onAdvance:advanceDeck, onAnswer:handleAnswer, onCurrentWord:(id)=>{currentWordRef.current=id;}, onTapKanji:setKanjiPopup, onTapWord:setWordPopup })),
      mode==='words' && React.createElement(WordsMode, { items, progress, onRemove:handleRemove, onAdd:handleAdd, onEdit:handleEdit, onMerge:handleMerge, onResetWord:resetWord, onMarkMastered:markMastered, activeIds:activeIds||[], onAddToActive:addToActive, onRemoveFromActive:removeFromActive, masteryTarget, onTapKanji:setKanjiPopup, onTapWord:setWordPopup }),
      mode==='read' && React.createElement(ReadMode, { onTapWord:setWordPopup }),
      mode==='kanji' && React.createElement(KanjiMode, { items })
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
<script>
  // Register the service worker for offline support (PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
